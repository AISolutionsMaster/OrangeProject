name: Playwright Cucumber Tests
on:
  push:
    branches: [ main]
  schedule:
    - cron: '0 10 * * *'
jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    # - name: Install Dependencies
    #   run: |
    #     python -m pip install json
    # - name: Install dependencies
    #   run: npm ci
    # - name: Install Playwright Browsers
    #   run: npx playwright install chromium --with-deps
    # - name: Install Cucumber
    #   run: npm install --save-dev @cucumber/cucumber
    # - name: Run global file to get session login
    #   run: npx playwright test || true
    # - name: Run automated testcase with cucumber
    #   run: npm test ||true
    #  shell: bash
    - name: Authenticate GitHub CLI
      run: echo "${{ secrets.GH_PAT }}" | gh auth login --with-token
      shell: bash
      if: always()
    - name: List previous successful runs
      id: list_runs
      run: |
        gh run list --workflow=e2e.yml --branch=main --json databaseId --jq '.[].databaseId' > run_ids1.txt
        tail -10 run_ids1.txt >run_ids.txt
      if: always()
    - name: Download artifacts from previous runs
      run: |
        while IFS= read -r run_id; do
          gh run download "$run_id" --dir "artifacts/$run_id" || echo "No artifacts found for run_id: $run_id"
        done < run_ids.txt
        ls -lrt
        python process_runs.py
      if: always()
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        path: cucumber-report.json
      if: always()

