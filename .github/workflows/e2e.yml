name: Playwright Cucumber Tests
on:
  push:
    branches: [ main]
  schedule:
    - cron: '0 10 * * *'
jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    - name: Install Cucumber
      run: npm install --save-dev @cucumber/cucumber
    - name: Run global file to get session login
      run: npx playwright test || true
    - name: Run automated testcase with cucumber
      run: npm test ||true
      shell: bash
    - name: Authenticate GitHub CLI
      run: echo "${{ secrets.GH_PAT }}" | gh auth login --with-token
    - name: List previous successful runs
      id: list_runs
      run: |
        gh run list --workflow=e2e.yml --branch=main --json databaseId 
      if: always()
    - name: Download artifacts from previous runs
      run: |
        while IFS= read -r run_id; do
          gh run download "$run_id" --dir artifacts/$run_id
        done < run_ids.txt
      if: always()
    - name: Rename the file
      run: |
        cp test-results/cucumber-report.json runreport/cucumber-report_$(date +%Y%m%d_%H%M%S).json
        ls runreport
      if: always()
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        path: runreport/cucumber-report*.json
      if: always()

